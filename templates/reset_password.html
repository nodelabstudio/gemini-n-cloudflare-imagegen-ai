<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password - Cloudfire Image Generator</title>
  <link rel="icon" type="image/jpeg" href="/static/fire-logo.jpg" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { heading: ['Space Grotesk', 'system-ui', 'sans-serif'], body: ['DM Sans', 'system-ui', 'sans-serif'] },
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    body { font-family: 'DM Sans', system-ui, sans-serif; }
    :root { --bg: #FFFDF7; --bg-card: #fff; --fg: #1a1a1a; --fg-muted: #555; --fg-dim: #777; --border: #000; --shadow: #000; }
    .dark { --bg: #1a1a1a; --bg-card: #2a2a2a; --fg: #f0f0f0; --fg-muted: #ccc; --fg-dim: #999; --border: #f0f0f0; --shadow: #000; }
    .nb-card { border: 3px solid var(--border); box-shadow: 6px 6px 0 var(--shadow); }
    .nb-btn { border: 3px solid #000; box-shadow: 4px 4px 0 #000; transition: all 0.1s ease; }
    .nb-btn:hover { box-shadow: 2px 2px 0 #000; transform: translate(2px, 2px); }
    .nb-btn:active { box-shadow: 0 0 0 #000; transform: translate(4px, 4px); }
    .nb-input { border: 2.5px solid #000; color: #1a1a1a; background: #fff; }
    .nb-input:focus { outline: none; box-shadow: 3px 3px 0 #FF6B35; }
    .nb-input::placeholder { color: #AAA; }
    #theme-toggle { cursor: pointer; transition: transform 0.3s ease; }
    #theme-toggle:hover { transform: scale(1.15); }
  </style>
  <script>
    (function() {
      const t = localStorage.getItem('theme');
      if (t === 'dark' || (!t && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark');
      }
    })();
  </script>
</head>
<body class="h-full bg-[var(--bg)] text-[var(--fg)] flex items-center justify-center relative overflow-hidden">

  <!-- Background decoration -->
  <div class="absolute inset-0 pointer-events-none overflow-hidden">
    <div class="absolute -top-10 -right-10 w-48 h-48 bg-[#FFD166] rounded-full opacity-30"></div>
    <div class="absolute -bottom-16 -left-16 w-64 h-64 bg-[#FF6B35] rounded-full opacity-20"></div>
    <div class="absolute bottom-1/3 right-[12%] w-20 h-20 bg-[#FF69B4] opacity-25 rotate-45" style="border: 3px solid #000;"></div>
    <div class="absolute top-1/4 left-[5%] w-14 h-14 bg-[#BFFF00] opacity-25 -rotate-12" style="border: 3px solid #000;"></div>
  </div>

  <div class="relative z-10 w-full max-w-md px-4 sm:px-6">
    <div class="nb-card bg-[var(--bg-card)] rounded-md p-6 sm:p-10">

      <!-- Theme toggle -->
      <div class="flex justify-end mb-2">
        <svg id="theme-toggle" onclick="toggleTheme()" class="w-5 h-5 text-[var(--fg-dim)]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <g id="icon-sun" class="hidden"><circle cx="12" cy="12" r="5" stroke-width="2"/><path stroke-width="2" stroke-linecap="round" d="M12 1v2m0 18v2m11-11h-2M3 12H1m16.36-7.36l-1.41 1.41M7.05 16.95l-1.41 1.41m12.72 0l-1.41-1.41M7.05 7.05L5.64 5.64"/></g>
          <g id="icon-moon"><path stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></g>
        </svg>
      </div>

      <!-- Header -->
      <div class="text-center mb-8">
        <img src="/static/fire-logo.jpg" alt="Cloudfire" class="w-16 h-16 sm:w-20 sm:h-20 mx-auto mb-4 rounded-lg" style="border: 3px solid var(--border); box-shadow: 3px 3px 0 var(--shadow);" />
        <h1 class="font-heading text-3xl font-bold tracking-tight">New password</h1>
        <p class="text-sm text-[var(--fg-muted)] mt-1">Choose a new password for your account</p>
      </div>

      <!-- Error -->
      {% if error %}
      <div class="mb-6 px-4 py-3 bg-[#FFE0E0] border-2 border-[#FF4444] text-[#CC0000] text-sm font-medium rounded-md">
        {{ error }}
      </div>
      {% endif %}

      <!-- Form -->
      <form method="POST" action="/reset-password/{{ token }}" class="space-y-5">
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}" />

        <div>
          <label for="password" class="block text-sm font-bold mb-1.5">New password</label>
          <input type="password" id="password" name="password" required autocomplete="new-password" autofocus
            minlength="8"
            class="nb-input w-full bg-white rounded-md px-4 py-3 text-sm"
            placeholder="Enter new password" />
          <p class="text-xs text-[var(--fg-dim)] mt-1">At least 8 characters</p>
        </div>

        <div>
          <label for="confirm_password" class="block text-sm font-bold mb-1.5">Confirm new password</label>
          <input type="password" id="confirm_password" name="confirm_password" required autocomplete="new-password"
            class="nb-input w-full bg-white rounded-md px-4 py-3 text-sm"
            placeholder="Confirm new password" />
        </div>

        <button type="submit"
          class="nb-btn w-full bg-[#FF6B35] text-white font-bold py-3 rounded-md text-base">
          Reset Password
        </button>
      </form>

      <!-- Back to login -->
      <p class="text-center text-sm text-[var(--fg-dim)] mt-6">
        <a href="/login" class="text-[#FF6B35] hover:underline font-bold">Back to sign in</a>
      </p>

    </div>
  </div>

  <script>
    function toggleTheme() {
      const isDark = document.documentElement.classList.toggle('dark');
      localStorage.setItem('theme', isDark ? 'dark' : 'light');
      updateThemeIcon();
    }
    function updateThemeIcon() {
      const isDark = document.documentElement.classList.contains('dark');
      document.getElementById('icon-sun').classList.toggle('hidden', !isDark);
      document.getElementById('icon-moon').classList.toggle('hidden', isDark);
    }
    updateThemeIcon();
  </script>
</body>
</html>
