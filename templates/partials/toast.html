<!-- Toast container -->
<div id="toast-container" class="fixed top-4 right-4 z-[100] flex flex-col gap-2"></div>

<script>
function showToast(message, type = "info") {
  const container = document.getElementById("toast-container");
  const toast = document.createElement("div");

  const colors = {
    success: "bg-[#BFFF00]",
    error: "bg-[#FFE0E0]",
    info: "bg-[#7DF9FF]",
  };

  toast.className = `${colors[type] || colors.info} text-[#1a1a1a] text-sm font-bold px-4 py-3 rounded-md max-w-sm cursor-pointer`;
  toast.style.cssText = "border: 2px solid #000; box-shadow: 3px 3px 0 #000; transform: translateX(120%); transition: transform 0.3s ease, opacity 0.3s ease;";
  toast.textContent = message;
  toast.onclick = () => dismissToast(toast);

  container.appendChild(toast);

  // Slide in
  requestAnimationFrame(() => {
    toast.style.transform = "translateX(0)";
  });

  // Auto dismiss after 4s
  setTimeout(() => dismissToast(toast), 4000);
}

function dismissToast(toast) {
  if (!toast.parentNode) return;
  toast.style.transform = "translateX(120%)";
  toast.style.opacity = "0";
  setTimeout(() => toast.remove(), 300);
}
</script>
