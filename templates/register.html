<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register - AI Image Generator</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            surface: { 50: '#f8fafb', 100: '#f0f4f5', 200: '#e2e8ea', 700: '#1e2a30', 800: '#151f24', 900: '#0d1519', 950: '#080e12' },
            accent: { 400: '#5eead4', 500: '#2dd4bf', 600: '#14b8a6' },
            gold: { 400: '#facc15', 500: '#eab308' },
          },
          fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    body { font-family: 'Inter', system-ui, sans-serif; }
    .gradient-border {
      background: linear-gradient(135deg, #2dd4bf33, #14b8a633, #facc1533);
      padding: 1px;
      border-radius: 1.25rem;
    }
    .gradient-border-inner {
      background: #151f24;
      border-radius: calc(1.25rem - 1px);
    }
    @keyframes float {
      0%, 100% { transform: translateY(0px) rotate(0deg); opacity: 0.03; }
      50% { transform: translateY(-20px) rotate(3deg); opacity: 0.06; }
    }
    .float-1 { animation: float 8s ease-in-out infinite; }
    .float-2 { animation: float 10s ease-in-out infinite 2s; }
    .float-3 { animation: float 12s ease-in-out infinite 4s; }
  </style>
</head>
<body class="h-full bg-surface-950 text-surface-100 flex items-center justify-center relative overflow-hidden">

  <!-- Background shapes -->
  <div class="absolute inset-0 pointer-events-none">
    <div class="float-1 absolute top-20 left-[15%] w-72 h-72 rounded-full bg-accent-500/5 blur-3xl"></div>
    <div class="float-2 absolute bottom-20 right-[10%] w-96 h-96 rounded-full bg-gold-500/5 blur-3xl"></div>
    <div class="float-3 absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] rounded-full bg-accent-600/3 blur-3xl"></div>
  </div>

  <div class="relative z-10 w-full max-w-md px-6">
    <div class="gradient-border">
      <div class="gradient-border-inner p-8 sm:p-10">

        <!-- Header -->
        <div class="text-center mb-8">
          <div class="inline-flex items-center justify-center w-14 h-14 rounded-2xl bg-accent-500/10 border border-accent-500/20 mb-4">
            <svg class="w-7 h-7 text-accent-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                d="M19 7.5v3m0 0v3m0-3h3m-3 0h-3m-2.25-4.125a3.375 3.375 0 11-6.75 0 3.375 3.375 0 016.75 0zM4 19.235v-.11a6.375 6.375 0 0112.75 0v.109A12.318 12.318 0 0110.374 21c-2.331 0-4.512-.645-6.374-1.766z" />
            </svg>
          </div>
          <h1 class="text-2xl font-bold tracking-tight">Create account</h1>
          <p class="text-sm text-surface-200/50 mt-1">Get started with AI Image Generator</p>
        </div>

        <!-- Error -->
        {% if error %}
        <div class="mb-6 px-4 py-3 rounded-lg bg-red-500/10 border border-red-500/20 text-red-400 text-sm">
          {{ error }}
        </div>
        {% endif %}

        <!-- Form -->
        <form method="POST" action="/register" class="space-y-5">
          <input type="hidden" name="csrf_token" value="{{ csrf_token }}" />

          <div>
            <label for="username" class="block text-xs font-medium text-surface-200/60 mb-1.5">Username</label>
            <input type="text" id="username" name="username" required autocomplete="username" autofocus
              minlength="3" maxlength="100"
              class="w-full bg-surface-900 border border-surface-700/60 rounded-lg px-4 py-3 text-sm
                     focus:outline-none focus:ring-2 focus:ring-accent-500/40 focus:border-accent-500/60
                     transition placeholder:text-surface-200/20"
              placeholder="Choose a username" />
            <p class="text-[11px] text-surface-200/30 mt-1">At least 3 characters</p>
          </div>

          <div>
            <label for="password" class="block text-xs font-medium text-surface-200/60 mb-1.5">Password</label>
            <input type="password" id="password" name="password" required autocomplete="new-password"
              minlength="8"
              class="w-full bg-surface-900 border border-surface-700/60 rounded-lg px-4 py-3 text-sm
                     focus:outline-none focus:ring-2 focus:ring-accent-500/40 focus:border-accent-500/60
                     transition placeholder:text-surface-200/20"
              placeholder="Create a password" />
            <p class="text-[11px] text-surface-200/30 mt-1">At least 8 characters</p>
          </div>

          <div>
            <label for="confirm_password" class="block text-xs font-medium text-surface-200/60 mb-1.5">Confirm password</label>
            <input type="password" id="confirm_password" name="confirm_password" required autocomplete="new-password"
              class="w-full bg-surface-900 border border-surface-700/60 rounded-lg px-4 py-3 text-sm
                     focus:outline-none focus:ring-2 focus:ring-accent-500/40 focus:border-accent-500/60
                     transition placeholder:text-surface-200/20"
              placeholder="Confirm your password" />
          </div>

          <button type="submit"
            class="w-full bg-gradient-to-r from-accent-600 to-accent-500 hover:from-accent-500 hover:to-accent-400
                   text-surface-950 font-semibold py-3 rounded-lg transition-all duration-200 active:scale-[0.98]">
            Create Account
          </button>
        </form>

        <!-- Login link -->
        <p class="text-center text-sm text-surface-200/40 mt-6">
          Already have an account?
          <a href="/login" class="text-accent-400 hover:text-accent-500 font-medium transition">Sign in</a>
        </p>

      </div>
    </div>
  </div>

</body>
</html>
