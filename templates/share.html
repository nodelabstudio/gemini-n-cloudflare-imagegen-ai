<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ image.prompt[:60] }} - Cloudfire</title>
  <link rel="icon" type="image/jpeg" href="/static/fire-logo.jpg" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    body { font-family: 'DM Sans', system-ui, sans-serif; }
    .nb-card { border: 3px solid #000; box-shadow: 5px 5px 0 #000; }
    .nb-btn { border: 3px solid #000; box-shadow: 4px 4px 0 #000; transition: all 0.1s ease; }
    .nb-btn:hover { box-shadow: 2px 2px 0 #000; transform: translate(2px, 2px); }
    .nb-badge { border: 2px solid #000; color: #1a1a1a; font-weight: 700; font-size: 10px; text-transform: uppercase; letter-spacing: 0.05em; }
  </style>
</head>
<body class="min-h-screen bg-[#FFFDF7] text-[#1a1a1a]">

  <div class="max-w-2xl mx-auto px-4 py-8 sm:py-12">
    <!-- Header -->
    <div class="flex items-center gap-3 mb-8">
      <img src="/static/fire-logo.jpg" alt="Cloudfire" class="w-10 h-10 rounded-md" style="border: 2px solid #000;" />
      <div>
        <h1 class="font-heading text-xl font-bold">
          <span class="text-[#FF6B35]">Cloud</span><span class="text-[#FFD166]">fire</span>
        </h1>
        <p class="text-xs text-[#888]">Shared Image</p>
      </div>
    </div>

    <!-- Image card -->
    <div class="nb-card bg-white rounded-md overflow-hidden">
      <img src="/s/{{ image.share_token }}/image" alt="Generated image" class="w-full" />
      <div class="p-5 space-y-3" style="border-top: 2.5px solid #000;">
        <p class="text-sm text-[#555] leading-relaxed">{{ image.prompt }}</p>
        <div class="flex items-center gap-2">
          {% if image.provider == 'cloudflare' %}
          <span class="nb-badge px-1.5 py-0 rounded-sm bg-[#FF6B35] text-white" style="font-size: 8px;">CF</span>
          {% else %}
          <span class="nb-badge px-1.5 py-0 rounded-sm bg-[#4285F4] text-white" style="font-size: 8px;">G</span>
          {% endif %}
          <span class="text-xs text-[#888]">{{ image.model_name }}</span>
          <span class="text-xs text-[#CCC]">{{ image.created_at.strftime('%b %d, %Y') }}</span>
        </div>
      </div>
    </div>

    <!-- CTA -->
    <div class="mt-8 text-center">
      <p class="text-sm text-[#888] mb-3">Create your own AI-generated images</p>
      <a href="/register" class="nb-btn inline-block bg-[#FF6B35] text-white font-bold px-6 py-2.5 rounded-md">
        Get Started Free
      </a>
    </div>
  </div>

</body>
</html>
